general.import = ["~/.config/alacritty/colors.toml"]

[terminal.shell]
program = "/usr/bin/fish"

[font]
size = 12

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[window]
padding = { x = 10, y = 10 }
opacity = 0.9

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500   # ms — equivalent to kitty's 0.5
blink_timeout = 1      # seconds before stopping, same as kitty

[bell]
animation = "Ease"
