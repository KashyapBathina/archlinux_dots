[colors.primary]
background = "{{colors.background.default.hex}}"
foreground = "{{colors.on_background.default.hex}}"

[colors.cursor]
cursor = "{{colors.primary.default.hex}}"
text   = "{{colors.on_primary.default.hex}}"

[colors.selection]
text       = "{{colors.on_secondary_container.default.hex}}"
background = "{{colors.secondary_container.default.hex}}"

[colors.normal]
black   = "#4c4c4c"
red     = "{{colors.error.default.hex}}"
green   = "{{colors.on_surface.default.hex}}"
yellow  = "{{colors.secondary.default.hex}}"
blue    = "{{colors.primary.default.hex}}"
magenta = "{{colors.error.default.hex}}"
cyan    = "{{colors.on_surface.default.hex}}"
white   = "#f0f0f0"

[colors.bright]
black   = "{{colors.on_background.default.hex}}"
red     = "{{colors.on_error_container.default.hex}}"
green   = "{{colors.on_tertiary_container.default.hex}}"
yellow  = "{{colors.on_secondary_container.default.hex}}"
blue    = "{{colors.on_primary_container.default.hex}}"
magenta = "{{colors.on_error_container.default.hex}}"
cyan    = "{{colors.on_surface_variant.default.hex}}"
white   = "#e7e7e7"
